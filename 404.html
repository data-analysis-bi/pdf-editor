<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Pro</title>
  <script>
    // GitHub Pages SPA redirect: when GitHub serves a 404 for a deep link,
    // this page stores the path in sessionStorage and redirects to index.html
    var path = window.location.pathname;
    var base = '/pdf-editor';
    // Strip the base from the path so React Router sees the right route
    var route = path.startsWith(base) ? path.slice(base.length) || '/' : path;
    sessionStorage.setItem('gh-pages-redirect', route + window.location.search + window.location.hash);
    window.location.replace('/pdf-editor/');
  </script>
</head>
<body></body>
</html>
